<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f83cc;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f83cc;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3a6bb0;
    }

    .summary {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f7fafc;
      margin-bottom: 8px;
      transition: background 0.2s;
    }

    li.checked {
      background: #edf7ed;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #4f83cc;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .actions button {
      padding: 8px 14px;
      font-size: 0.82rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-clear-checked {
      background: #edf2f7;
      color: #4a5568;
    }

    .btn-clear-checked:hover {
      background: #e2e8f0;
    }

    .btn-clear-all {
      background: #fff5f5;
      color: #e53e3e;
    }

    .btn-clear-all:hover {
      background: #fed7d7;
    }

    .status {
      font-size: 0.78rem;
      color: #a0aec0;
      text-align: center;
      margin-top: 12px;
    }

    .status.error {
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off">
      <button onclick="addItem()">추가</button>
    </div>

    <div class="summary" id="summary"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty" style="display:none">아이템이 없습니다.</div>

    <div class="actions">
      <button class="btn-clear-checked" onclick="clearChecked()">완료 항목 삭제</button>
      <button class="btn-clear-all" onclick="clearAll()">전체 삭제</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dwehldnxoknoyueunlrf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3ZWhsZG54b2tub3l1ZXVubHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjAzMzMsImV4cCI6MjA4ODMzNjMzM30.9MAFEOIR8XB1IcIv-rIO24kvppOqsYbGQ6zP8PAHUW8';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isError ? ' error' : '');
    }

    async function loadItems() {
      setStatus('불러오는 중...');
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        setStatus('데이터 로드 실패: ' + error.message, true);
        return;
      }
      items = data;
      setStatus('');
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const summary = document.getElementById('summary');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        summary.textContent = '';
      } else {
        empty.style.display = 'none';
        const checked = items.filter(i => i.checked).length;
        summary.textContent = `전체 ${items.length}개 / 완료 ${checked}개`;
      }

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => toggleItem(item.id));

        const span = document.createElement('span');
        span.className = 'item-name';
        span.textContent = item.name;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = 'x';
        delBtn.title = '삭제';
        delBtn.addEventListener('click', () => deleteItem(item.id));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const name = input.value.trim();
      if (!name) return;

      input.value = '';
      input.focus();

      const { data, error } = await db
        .from('shopping_items')
        .insert({ name, checked: false })
        .select()
        .single();

      if (error) {
        setStatus('추가 실패: ' + error.message, true);
        return;
      }
      items.push(data);
      render();
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);

      if (error) {
        setStatus('업데이트 실패: ' + error.message, true);
        return;
      }
      item.checked = !item.checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
        return;
      }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
        return;
      }
      items = items.filter(i => !i.checked);
      render();
    }

    async function clearAll() {
      if (items.length === 0) return;
      if (!confirm('전체 항목을 삭제할까요?')) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .neq('id', 0);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
        return;
      }
      items = [];
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
